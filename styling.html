<!DOCTYPE html>
<html>
<head>
    <title>Styling</title>

    <style>

        h1{
            background-color: #0b0f2b;
            color: white;
            padding: 15px;
        }

        h1 span{
            color: cyan;
        }

        h2{
            background-color: #574c9d;
            color: white;
            text-align: center;
            font-style: italic;
            padding: 10px;
        }

        h3{
            background-color: lightblue;
            text-align: right;
            text-decoration: underline;
            padding: 10px;
        }

    </style>
</head>

<body>

    <h1>My<span>Cloud</span></h1>

    <h2>Completed Projects:</h2>

    <h3>Contact Us</h3>

</body>
</html>
