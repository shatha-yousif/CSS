<!DOCTYPE html>
<html lang="en">
<head>
    <title>Position Practice</title>

    <style>

        .container{
            width:700px;
            background-color:silver;
            margin:0px auto;
            padding:15px;
        }

        .top-nav{
            height:150px;
            background-color:green;
            margin-bottom:15px;
        }

        .row{
            display:flex;
            gap:15px;
        }

        .side-nav{
            height:300px;
            width:200px;
            background-color:blue;
        }

        .main{
            height:300px;
            width:470px;
            background-color:red;
            padding:15px;
            box-sizing:border-box;
        }

        .sub-content{
            height:150px;
            width:130px;
            background-color:yellow;

            display:inline-block;
            margin-right:10px;
        }

        #advertisement{
            height:90px;
            width:420px;
            background-color:purple;

            margin-top:20px;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="top-nav"></div>

        <div class="row">

            <div class="side-nav"></div>

            <div class="main">

                <div class="sub-content"></div>

                <div class="sub-content"></div>

                <div class="sub-content"></div>

                <div id="advertisement"></div>

            </div>

        </div>

    </div>

</body>
</html>
