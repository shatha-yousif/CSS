<!DOCTYPE html>
<html lang="en">
<head>
  <title>Position Practice</title>
  <style>
    .container{
      width: 950px;
      background-color: silver;
      margin: 0px auto;
      padding: 20px;
    }

    .top-nav{
      height: 150px;
      background-color: green;
      margin-bottom: 20px;
    }

    .side-nav{
      height: 300px;
      width: 200px;
      background-color: blue;
      display: inline-block;
      vertical-align: top;
      margin-right: 20px;
    }

    .main{
      height: 400px;
      width: 650px;
      background-color: red;
      display: inline-block;
      vertical-align: top;
      padding: 20px;
    }

    .sub-content{
      height: 200px;
      width: 200px;
      background-color: yellow;
      display: inline-block;
      margin-right: 12px;
    }

    #advertisement{
      height: 120px;
      width: 630px;
      background-color: purple;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="top-nav"></div>
    <div class="side-nav"></div>
    <div class="main">
      <div class="sub-content"></div>
      <div class="sub-content"></div>
      <div class="sub-content"></div>
      <div id="advertisement"></div>
    </div>
  </div>
</body>
</html>
